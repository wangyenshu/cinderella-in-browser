<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cinderella2 (CheerpJ)</title>
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>
    <style>
      body {
        margin: 0;
        background: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <script>
      function execCb(cmdPath, argsArray) {
        if (cmdPath == "xdg-open") {
          window.open(argsArray, "_blank");
        }
      }

      (async function () {
        await cheerpjInit({ 
          version: 17, 
          enableDebug: false, 
          execCallback: execCb,
          systemProperties: { 
            "user.home": "/str", 
            "user.dir": "/app/cinderella-in-browser/cinderella",
            "apple.laf.useScreenMenuBar": "true",
            "apple.awt.graphics.UseQuartz": "true"
          }
        });

        cheerpjCreateDisplay(1400, 850);
        
        await cheerpjRunMain(
          "de.cinderella.Cindy",
          [
            "/app/cinderella-in-browser/cinderella/Languages/", 
            "/app/cinderella-in-browser/cinderella/lib/antlr.jar",
            "/app/cinderella-in-browser/cinderella/lib/cbookif.jar",
            "/app/cinderella-in-browser/cinderella/lib/cindy2.jar",
            "/app/cinderella-in-browser/cinderella/lib/flatlaf-2.4.jar",
            "/app/cinderella-in-browser/cinderella/lib/gson-2.9.0.jar",
            "/app/cinderella-in-browser/cinderella/lib/gson-2.9.0-sources.jar",
            "/app/cinderella-in-browser/cinderella/lib/iText-2.1.7.jar",
            "/app/cinderella-in-browser/cinderella/lib/javaosc.jar",
            "/app/cinderella-in-browser/cinderella/lib/jmdns.jar",
            "/app/cinderella-in-browser/cinderella/lib/jruby.jar",
            "/app/cinderella-in-browser/cinderella/lib/LeapJava.jar",
            "/app/cinderella-in-browser/cinderella/lib/log4j-1.2.16.jar",
            "/app/cinderella-in-browser/cinderella/lib/plugin.jar",
            "/app/cinderella-in-browser/cinderella/lib/script-api.jar",
            "/app/cinderella-in-browser/cinderella/lib/VAqua.jar",
            "/app/cinderella-in-browser/cinderella/lib/xmlrpc-client-1.1.jar",
            "/app/cinderella-in-browser/cinderella/lib/yajtl.jar",
            "/app/cinderella-in-browser/cinderella/Plugins/KetCindyPlugin.jar",
            "/app/cinderella-in-browser/cinderella/Plugins/Cindy3D/Cindy3D.jar",
            "/app/cinderella-in-browser/cinderella/Plugins/Cindy3D/commons-math-2.2.jar",
            "/app/cinderella-in-browser/cinderella/Plugins/Cindy3D/gluegen-rt.jar",
            "/app/cinderella-in-browser/cinderella/Plugins/Cindy3D/jogl-all.jar"
          ].join(":")
        );
      })();
    </script>
  </body>
</html>
