updateErrorTitle=Problem
updateErrorMessage=Cinderella konnte sich nicht mit dem Update Server verbinden. Dies sollte nicht passieren - bitte kontaktieren sie die Cinderella Homepage.
updateIOErrorMessage=Cinderella konnte sich nicht mit dem Update Server verbinden. Vergewissern Sie sich, dass Ihre Internetverbindung intakt ist. Das Problem kann auch durch einen Zeitweiligen Serverausfall verursacht sein - versuchen sie es eventuell sp\u00E4ter nochmals. Falls das Problem weiterhin besteht konsutieren sie die Cinderella Homepage.
updateIllegalAccess=Cinderella konnte sich nicht mit dem Update Server verbinden. Entweder gibt es ein Problem mit der Internetverbindung oder ihre Cinderella Version kann nicht upgedated werden.
