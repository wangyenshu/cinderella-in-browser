updateAvailable=Es gibt ein aktuelles Update. Sie k\u00F6nnen diese downloaden oder den Vorgang jetzt abbrechen. Wir empfehlen jedoch zu updaten, da die neue Version weitere Features oder Bugfixes enthalten kann.
noTempFileTitle=Problem beim Erzeugen des tempr\u00E4ren Datei.
noTempFileMSG=Cinderella konnte die tempr\u00E4ren Datei ($FILEABS) nicht erzeugen. Vergewisserns sie sich, ob sie Schreibberechtigung und gen\u00FCgend freien Speicherplatz haben.
