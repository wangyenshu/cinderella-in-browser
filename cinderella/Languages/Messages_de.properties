gettingUpdate=Bitte warten Sie, bis der Download beendet ist...
cannotReadUpdate=Es gab ein Problem w\u00E4hrend des Downloads. Das bedeutet entweder, dass nicht ge\u00FCgend Speicherplatz zur Verf\u00FCgung steht oder das die Internet Verbindung unterbrochen wurde. Versuchen Sie es sp\u00E4ter nochmals. Falls das Problem weiterhin besteht konsutieren sie die Cinderella Homepage.
cannotCreateZipfile=Cinderella konnte den Download nicht beenden, da es kein File auf ihrer ihrer Festplatte erzeugen konnte. Stellen Sie sicher, dass ge\u00FCgend Speicherplatz zur Verf\u00FCgung steht und sie die ausreichende Schreibberechtigung haben.
