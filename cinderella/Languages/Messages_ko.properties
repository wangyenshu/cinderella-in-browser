aboutMessage=<html><body><p>\uC0C1\uD638\uC791\uC6A9\uC801 \uAE30\uD558 \uC18C\uD504\uD2B8\uC6E8\uC5B4\uC778 \uC2E0\uB370\uB810\uB77C.2 \uB294<br>J\u00FCrgen Richter-Gebert \uC640 Ulrich Kortenkamp \uC5D0 \uC758\uD574 \uAC1C\uBC1C\uB418\uC5C8\uC2B5\uB2C8\uB2E4.<br>\u00A91996-2012 J\u00FCrgen Richter-Gebert and Ulrich Kortenkamp.<br><br> \uC774\uC804\uC5D0 \uAC1C\uBC1C\uB41C \uC2E0\uB370\uB810\uB77C\uB294 NeXTSTEP(TM) \uC73C\uB85C<br> J\u00FCrgen Richter-Gebert \uC640 Henry Crapo \uC758 \uACF5\uB3D9\uC791\uC5C5\uC5D0 \uC758\uD574 \uAC1C\uBC1C\uB418\uC5C8\uC2B5\uB2C8\uB2E4.<br>\uC790\uC138\uD55C \uC815\uBCF4\uB294 <a href="http://cinderella.de">cinderella.de</a>\uC5D0\uC11C \uC5BB\uC744 \uC218 \uC788\uC2B5\uB2C8\uB2E4.<br><br>*\uD55C\uAD6D \uC2E0\uB370\uB810\uB77C \uC5F0\uAD6C\uC18C: <a href="http://www.cinderella.or.kr">www.cinderella.or.kr</a><br>*\uC5F0\uB77D\uCC98: \uCD5C\uACBD\uC2DD(<a href="mailto:kyeong@cinderella.or.kr">kyeong@cinderella.or.kr</a>)</p>
aboutMessageDemo=\uB3D9\uC801 \uAE30\uD558 \uC18C\uD504\uD2B8\uC6E8\uC5B4 \uC2E0\uB370\uB810\uB77C\uC758 \uB370\uBAA8\uD310\uC740 Jurgen Richter-Gebert\uC640 Ulrich Kortenkamp\uAC00 \uC5F0\uAD6C \uAC1C\uBC1C\uD55C \uAC83\uC785\uB2C8\uB2E4. \uC774 \uC18C\uD504\uD2B8\uC6E8\uC5B4\uB294 Jurgen Richter-Gebert\uC640 Henry Crapo \uC5D0 \uC758\uD558\uC5EC \uACF5\uB3D9 \uC5F0\uAD6C\uD55C NeXTSTEP(TM) \uD310\uC758 \uBBF8\uBC1C\uB9E4\uD310\uC5D0 \uADFC\uAC70\uD558\uC600\uC73C\uBA70, \uD55C\uAE00\uD310\uC740 \uAE40\uC6A9\uAD6C, \uC774\uB355\uC2E0\uC774 \uC791\uC131\uD55C \uAC83\uC785\uB2C8\uB2E4. \uBCF4\uB2E4 \uC790\uC138\uD55C \uC815\uBCF4\uC5D0 \uB300\uD574\uC11C\uB294 \uC2E0\uB370\uB810\uB77C \uD648 \uD398\uC774\uC9C0 http://www.cinderella.de \uB97C  \uCC3E\uC544 \uC8FC\uC2ED\uC2DC\uC624
